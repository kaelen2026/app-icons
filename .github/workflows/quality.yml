name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  branch-policy:
    name: Branch Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce gitflow branch targets
        env:
          # Bound to env (not inlined) so branch names can't inject shell.
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          if [ "$BASE" = "dev" ]; then
            echo "OK: PR targets dev (head=$HEAD)."
          elif [ "$BASE" = "main" ] && [ "$HEAD" = "dev" ]; then
            echo "OK: dev -> main promotion."
          else
            echo "Disallowed PR target (base=$BASE, head=$HEAD)."
            echo "feature/fix/docs/chore branches must PR into dev; only dev may PR into main."
            exit 1
          fi

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit and component tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage
        run: pnpm test:coverage

  e2e:
    name: Production E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Production smoke tests
        run: pnpm test:e2e:prod
